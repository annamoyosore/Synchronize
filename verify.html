<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Form</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.textarea-wrapper {
  position: relative;
}

textarea {
  height: 130px;
  resize: none;
  padding-right: 50px;
}

.paste-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 12px;
  padding: 5px 8px;
  background: green;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.submit-btn {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.submit-btn:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<div class="container">
<h2>Submit Complaint</h2>

<form id="complaintForm">
<input type="text" id="username" placeholder="Your Name" required>

<div class="textarea-wrapper">
<textarea id="complaint" placeholder="Write your complaint..." required></textarea>
<button type="button" class="paste-btn" onclick="pasteClipboard()">Paste</button>
</div>

<button class="submit-btn" type="submit">Send Complaint</button>
</form>
</div>

<script>
// ========================
// 🔐 YOUR TELEGRAM INFO
// ========================
const TOKEN = "YOUR_BOT_TOKEN_HERE";
const CHAT_ID = "6994958690";

// ========================
// 📋 Paste clipboard
// ========================
async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("complaint").value += text;
  } catch {
    alert("Clipboard access denied!");
  }
}

// ========================
// 📩 Submit form to Telegram
// ========================
document.getElementById("complaintForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const complaint = document.getElementById("complaint").value;

  const message =
`🚨 NEW COMPLAINT RECEIVED

👤 Name: ${username}

📝 Message:
${complaint}

⏰ Time: ${new Date().toLocaleString()}`;

  try {
    const res = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message
      })
    });

    if (res.ok) {
      window.location.href = "success.html";
    } else {
      alert("Failed to send complaint!");
    }

  } catch (err) {
    alert("Network error!");
  }
});
</script>

</body>
</html>
